name: Refresh Horizon News
run-name: Refresh recent ${{ inputs.lookback_days }} days of news

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "新闻回看范围"
        required: true
        default: "7"
        type: choice
        options:
          - "3"
          - "7"
          - "14"

concurrency:
  group: horizon-manual-refresh
  cancel-in-progress: true

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # 需要写入权限来提交更改

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days }}
        run: |
          LOOKBACK_HOURS=$((LOOKBACK_DAYS * 24))
          uv run horizon --hours "$LOOKBACK_HOURS"

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "🔄 Hotspot refresh: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
